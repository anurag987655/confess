<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Lover?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bg-hearts" aria-hidden="true"></div>
    <div class="stage">
        <p id="plea-msg" class="plea-msg" aria-live="polite">🌸 Just one yes, pretty please? 🌸</p>
        <div class="container">
            <h1 class="proposal-text">Will you be my lover? <span class="heart" aria-hidden="true">❤️</span></h1>
            <p class="intro-line">Your smile is my favorite sunrise, can I keep it forever?</p>
            <div class="buttons">
                <button id="yes-btn">Yes 😍</button>
                <button id="no-btn">No 😢</button>
            </div>
        </div>
    </div>
    <div id="success-msg" class="hidden">
        <h1>🌸 Two different souls, one common silly story, and a forever that starts today. 🌷</h1>
        <p class="success-line">And a lifetime of soft smiles together.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
